server:
  port: 8080

spring:
  application:
    name: lost-found-backend

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lost_found?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 0216XXxx

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# ✅ MyBatis Plus 完整配置
mybatis-plus:
  # XML映射文件位置（有XML才需要，注解方式可省略）
  mapper-locations: classpath*:mapper/**/*.xml
  # 实体类包路径（开启别名，XML里可以直接写User而不是全路径）
  type-aliases-package: com.lostfound.backend.entity
  configuration:
    map-underscore-to-camel-case: true    # 下划线转驼峰 user_name → userName
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发期打印SQL
  global-config:
    db-config:
      id-type: auto                        # 主键自增策略
      logic-delete-field: deleted          # 逻辑删除字段名
      logic-delete-value: 1                # 已删除
      logic-not-delete-value: 0            # 未删除

# JWT配置
jwt:
  secret: lost-found-platform-secret-key-2024-very-long-string
  access-token-expire: 7200       # AccessToken过期时间(秒) 2小时
  refresh-token-expire: 604800    # RefreshToken过期时间(秒) 7天

# 文件存储配置
file:
  # ✅ 用相对路径，Windows/Linux都能跑
  upload-path: ./uploads/
  access-path: /uploads/

# Knife4j 文档配置
knife4j:
  enable: true
  basic:
    enable: false
  setting:
    language: zh_cn